<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Marquee Component</title>

  <style>
    * {
      padding: 0;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    
    .demo-section {
      margin: 30px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #fafafa;
    }

    .demo-section h2 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #666;
      font-size: 18px;
    }

    web-marquee {
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    web-marquee > div {
      flex-shrink: 0;
      padding: 0 10px;
    }

    web-marquee > div > div {
      width: 300px;
      height: 200px;
      border: 2px solid #ddd;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      color: #666;
    }

    web-marquee > div.is-active > div {
      background-color: #007bff;
      color: #fff;
      border-color: #007bff;
      transition: all ease 300ms;
    }

    .controls {
      margin-top: 20px;
    }

    button {
      padding: 8px 16px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .log {
      margin-top: 20px;
      padding: 15px;
      background-color: #f5f5f5;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-title {
      margin-bottom: 10px;
      color: #333;
    }

    .log-item {
      margin: 2px 0;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Web Marquee Component 示範</h1>

  <div class="demo-section">
    <h2>範例 1: 基本跑馬燈 (向左移動)</h2>
    <web-marquee 
      marquee-speed="1"
      marquee-pause-on-hover
      marquee-enable-drag
      marquee-active-class="is-active"
    >
      <!-- 這層的 transition 不可設定 transform 屬性，因會和 js 產生的 transform 位移衝突到 -->
      <!-- 所以 active 樣式需指定在下一層 -->
      <!-- 間距目前只能在這層使用 padding 推，無法用 gap、margin -->
      <div>
        <div>item1</div>
      </div>
      <div>
        <div>item2</div>
      </div>
      <div>
        <div>item3</div>
      </div>
      <div>
        <div>item4</div>
      </div>
    </web-marquee>
  </div>

  <div class="demo-section">
    <h2>範例 2: 反向跑馬燈 (向右移動)</h2>
    <web-marquee 
      marquee-speed="1.5"
      marquee-pause-on-hover
      marquee-enable-drag
      marquee-active-class="is-active"
      marquee-reverse-direction
    >
      <div>
        <div>A</div>
      </div>
      <div>
        <div>B</div>
      </div>
      <div>
        <div>C</div>
      </div>
      <div>
        <div>D</div>
      </div>
    </web-marquee>
  </div>

  <div class="controls">
    <button type="button" class="js-stop-btn">暫停 (Stop)</button>
    <button type="button" class="js-start-btn">開始 (Start)</button>
    <button type="button" class="js-refresh-btn">更新 (Refresh)</button>
    <button type="button" class="js-prev-btn">上一個 (Prev)</button>
    <button type="button" class="js-next-btn">下一個 (Next)</button>
  </div>

  <div class="log">
    <div class="log-title"><strong>事件日誌:</strong></div>
    <div id="log-content"></div>
  </div>
  <script type="module">
    //----------------------------
    // Import Web Component
    //----------------------------
    import { WebMarquee } from './dist/index.js';

    //----------------------------
    // 取得所有 marquee 元素
    //----------------------------
    const marquees = document.querySelectorAll('web-marquee');

    //----------------------------
    // 事件監聽器 - 監聽所有事件
    //----------------------------
    const logContent = document.getElementById('log-content');
    
    function addLog(message) {
      const logItem = document.createElement('div');
      logItem.className = 'log-item';
      logItem.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContent.insertBefore(logItem, logContent.firstChild);
      
      // 限制日誌數量
      while (logContent.children.length > 50) {
        logContent.removeChild(logContent.lastChild);
      }
    }

    marquees.forEach((marquee, index) => {
      marquee.addEventListener('web-marquee:start', (e) => {
        addLog(`範例 ${index + 1} - 開始`);
      });

      marquee.addEventListener('web-marquee:stop', (e) => {
        addLog(`範例 ${index + 1} - 停止`);
      });

      marquee.addEventListener('web-marquee:refresh', (e) => {
        addLog(`範例 ${index + 1} - 更新`);
      });

      marquee.addEventListener('web-marquee:prev', (e) => {
        addLog(`範例 ${index + 1} - 上一個`);
      });

      marquee.addEventListener('web-marquee:next', (e) => {
        addLog(`範例 ${index + 1} - 下一個`);
      });
    });

    //----------------------------
    // 按鈕控制
    //----------------------------
    const stopBtn = document.querySelector('.js-stop-btn');
    const startBtn = document.querySelector('.js-start-btn');
    const refreshBtn = document.querySelector('.js-refresh-btn');
    const prevBtn = document.querySelector('.js-prev-btn');
    const nextBtn = document.querySelector('.js-next-btn');

    // 暫停
    stopBtn.addEventListener('click', () => {
      marquees.forEach((marquee) => {
        marquee.stop();
      });
    });

    // 開始
    startBtn.addEventListener('click', () => {
      marquees.forEach((marquee) => {
        marquee.start();
      });
    });

    // 更新
    refreshBtn.addEventListener('click', () => {
      marquees.forEach((marquee) => {
        marquee.refresh();
      });
    });

    // 上一個
    prevBtn.addEventListener('click', () => {
      marquees.forEach((marquee) => {
        marquee.prev();
      });
    });

    // 下一個
    nextBtn.addEventListener('click', () => {
      marquees.forEach((marquee) => {
        marquee.next();
      });
    });
  </script>
</body>
</html>
